{% extends "base.html" %}
{% block content %}
<div class="max-w-4xl mx-auto">
    <div class="bg-gray-800 shadow rounded-lg p-6">
        <h2 class="text-3xl font-bold text-white mb-4 capitalize">Airnorth Scraper</h2>
        <div class="flex items-center justify-between mb-8">
            <p class="text-gray-400">Run the Airnorth async tracker in the background.</p>
            <button id="runBtn" class="bg-blue-600 hover:bg-blue-700 text-white font-bold py-2 px-4 rounded focus:outline-none focus:shadow-outline transition">
                Start Scraper
            </button>
        </div>

        <div id="statusAlert" class="hidden mb-6 p-4 rounded-md"></div>

        <div>
            <h3 class="text-xl font-semibold mb-4">Recent Output Files</h3>
            <div class="bg-gray-900 rounded-lg p-4 min-h-[200px]">
                <ul id="fileList" class="divide-y divide-gray-700">
                    <li class="py-3 text-gray-500 text-center">Loading...</li>
                </ul>
            </div>
        </div>
    </div>
</div>

<script>
    const airline = 'airnorth';
    const runBtn = document.getElementById('runBtn');
    const statusAlert = document.getElementById('statusAlert');
    const fileList = document.getElementById('fileList');

    runBtn.addEventListener('click', async () => {
        runBtn.disabled = true;
        runBtn.classList.add('opacity-50', 'cursor-not-allowed');
        runBtn.innerText = 'Starting...';

        try {
            const res = await fetch(`/api/run/${airline}`, { method: 'POST' });
            const data = await res.json();
            showAlert(data.message, data.status === 'started' ? 'success' : 'info');
        } catch (e) {
            showAlert('Failed to start scraper', 'error');
        }
        pollStatus();
    });

    function showAlert(msg, type) {
        statusAlert.classList.remove('hidden', 'bg-red-900', 'bg-green-900', 'bg-blue-900');
        if (type === 'error') statusAlert.classList.add('bg-red-900', 'text-red-200');
        else if (type === 'success') statusAlert.classList.add('bg-green-900', 'text-green-200');
        else statusAlert.classList.add('bg-blue-900', 'text-blue-200');
        statusAlert.innerText = msg;
    }

    async function pollStatus() {
        try {
            const res = await fetch(`/api/status/${airline}`);
            const data = await res.json();
            
            if (data.running) {
                runBtn.disabled = true;
                runBtn.classList.add('opacity-50', 'cursor-not-allowed');
                runBtn.innerText = 'Running...';
            } else {
                runBtn.disabled = false;
                runBtn.classList.remove('opacity-50', 'cursor-not-allowed');
                runBtn.innerText = 'Start Scraper';
            }

            if (data.recent_files.length === 0) {
                fileList.innerHTML = '<li class="py-3 text-gray-500 text-center">No files found.</li>';
            } else {
                fileList.innerHTML = data.recent_files.map(f => `
                    <li class="py-3 flex justify-between">
                        <span class="text-blue-400 truncate">${f.name}</span>
                        <span class="text-gray-500 text-sm">${f.modified_str}</span>
                    </li>
                `).join('');
            }
        } catch (e) {
            console.error(e);
        }
    }

    pollStatus();
    setInterval(pollStatus, 10000);
</script>
{% endblock %}
