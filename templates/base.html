<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flight Scraper Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        gray: {
                            900: '#111827',
                            800: '#1f2937',
                            700: '#374151',
                        }
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-gray-900 text-white min-h-screen font-sans">
    <nav class="bg-gray-800 border-b border-gray-700">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex items-center justify-between h-16">
                <div class="flex items-center">
                    <a href="/" class="text-xl font-bold text-blue-400">Flight Scraper Central</a>
                    <div class="ml-10 flex items-baseline space-x-4">
                        <a href="/qantas" class="hover:bg-gray-700 px-3 py-2 rounded-md text-sm font-medium">Qantas</a>
                        <a href="/airnorth" class="hover:bg-gray-700 px-3 py-2 rounded-md text-sm font-medium">Airnorth</a>
                        <a href="/nexus" class="hover:bg-gray-700 px-3 py-2 rounded-md text-sm font-medium">Nexus</a>
                    </div>
                </div>
            </div>
        </div>
    </nav>
    <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
        {% block content %}{% endblock %}
    </main>
</body>
</html>
